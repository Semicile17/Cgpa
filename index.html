<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CGPA Scheme Converter</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }
    #result {
      margin-top: 15px;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>CGPA Converter</h2>

  <input type="number" id="cgpa" placeholder="Enter Current CGPA" step="0.01">
  <button onclick="convert()">Convert</button>

  <div id="result"></div>
</div>

<script>
function convert() {
  let cgpa = parseFloat(document.getElementById("cgpa").value);

  if (isNaN(cgpa)) {
    document.getElementById("result").innerText = "Enter valid CGPA!";
    return;
  }

  let updated;

  // 🔥 EDIT THIS LOGIC BASED ON YOUR EXCEL

  // Example 1: Linear scaling
  // updated = cgpa * 1.05;

  // Example 2: Range-based mapping (more likely your case)
  if (cgpa >= 9) updated = 10;
  else if (cgpa >= 8) updated = 9;
  else if (cgpa >= 7) updated = 8;
  else if (cgpa >= 6) updated = 7;
  else if (cgpa >= 5) updated = 6;
  else updated = 5;

  document.getElementById("result").innerText = 
    "Updated CGPA: " + updated.toFixed(2);
}
</script>

</body>
</html>
